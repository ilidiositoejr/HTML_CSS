<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela 3</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;

        }
        table{
            border-collapse: collapse;
            width: 300px;
        }
        td, th{
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        thead{
            background-color: gray;
            color: white;
            
        }
        #tr{
            background-color: gray;
            color: white;
        }
        tfoot{
            background-color: gray;
            color: white;
        }


    </style>
</head>
<body>
    <h1>Tabelas Complicadas kkkkkkkh</h1>
    <table>
        <caption>Filmes Favoritos</caption>
        <thead>
            <tr>
                <th rowspan="2" scope="col">Area</th>
                <th rowspan="2" scope="col">Disciplinas</th>
                <th colspan="2" scope="colgroup">Notas</th>
                <th rowspan="2" scope="col">Media</th>
            
            </tr>
            <tr>
                <th scope="col">Nota 1</th>
                <th scope="col">Nota 2</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th rowspan="4" scope="rowgroup">Exatas</th>
                <td>Matematica</td>
                <td>0.0 </td>
                <td>0.0</td>
                <td>0.0</td>
            
            </tr>
            <tr>
            
                <td>Fisica</td>
                <td>0.0 </td>
                <td>0.0</td>
                <td>0.0</td>
            
            </tr>
            <tr>
                <td>Quimica</td>
                <td>0.0 </td>
                <td>0.0</td>
                <td>0.0</td>
            
            </tr>
            <tr>
                <td>Biologia</td>
                <td>0.0 </td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            
            <tr id="tr">
                <th colspan="4" scope="colgroup">Medias de Exatas</th>
                <td>0.0</td>
                
            
            </tr>
            
            <tr>
                <th rowspan="2" scope="rowgroup">Humanas</th>
                <td>Historia</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            
            </tr>
             <tr>
            
                <td>Geografia</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            
            </tr>

        </tbody>
        <tfoot>
            <tr>
                <th colspan="4" scope="row">Total</th>
                <td>0.0</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
