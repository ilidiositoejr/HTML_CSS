<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        table{
            width: 500px;
            border-collapse: collapse;
            position: relative;
        }
        td, th{
            border: 1px solid black;
            padding: 10px;
        }
        caption{
            font-size: 1.5em;
            font-weight: bold;
            padding: 10px;
            background-color: lightgray;
            border-radius: 10px 10px 0px 0px;
        }
        thead{
            background-color: gray;
            color: white;
        }
        thead >tr > th{
            position: sticky;
            top: 0;
            background-color: gray;
        }
        tbody > tr:nth-child(2n){
            background-color: lightgray;
        }
        tbody > tr:nth-child(2n-1){
            background-color: white;
        }
        tfoot{
            background-color: gray;
            color: white;
            border-radius: 0px 0px 10px 10px;
        }
        td.num{
            text-align: right;
        }
    </style>
</head>
<body>
    <h1>Trabalhando com tabelhas grandes</h1>
    <table>
        <caption>População das Uidades federativas</caption>
        <thead>
            <tr>
                <th scope="col">Estado</th>
                <th scope="col" style="width: 100px;">População</th>
            </tr>
            
        </thead>
        <tbody>
            <td>Maputo</td>
            <td class="num">45 919 049</td>
            <tr>
                <td>Minas Gerais</td>
                <td class="num">21 32 42</td>
            </tr>
            <tr>
                <td>Matola</td>
                <td class="num">200 400 60</td>
            </tr>
            <tr>
                <td>Boane</td>
                <td  class="num">21 32 42</td>
            </tr>
            <tr>
                <td>Nkobe</td>
                <td class="num">200 400 60</td>
            </tr>
            <tr>
                <td>Ressano</td>
                <td class="num">21 32 42</td>
            </tr>
            <tr>
                <td>komazi</td>
                <td class="num">200 400 60</td>
            </tr>
            <tr>
                <td>Gaza</td>
                <td class="num">21 32 42</td>
            </tr>
            <tr>
                <td>Tete</td>
                <td class="num">200 400 60</td>
            </tr>
            <tr>
                <td>Maxixe</td>
                <td class="num">21 32 42</td>
            </tr>
            <tr>
                <td>Magude</td>
                <td class="num">200 400 60</td>
            </tr>
            
        </tbody>
        <tfoot>
            <tr>
                <th scope="row">Total de Habitantes</th>
                <td class="num">0000</td>
            </tr>
        </tfoot>
    </table>
    
</body>
</html>
