<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <Style>
        h1{
            
            
            text-align: center;
            background-color: lightgrey;
            height: 300px;
            width: 300px;
            

            border:10px solid darkblue;
            

            padding: 10px 10px 10px 10px;
            
           

            margin: 20px auto 40px auto;

            outline: 5px dashed salmon;
        }
        a{
            
            border-width: 2px;
            border-style: solid;
            border-color: red;

            padding-bottom: 10px;
            padding-left: 10px;
            padding-right: 10px;
            padding-top: 10px;

            margin-top: 20px;
            margin-right: 20px;
            margin-bottom: 40px;
            margin-left: 20px;

            outline-width: 5px;
            outline-style: dashed;
            outline-color: salmon;
        }
    </Style>
</head>
<body>
    <h1>Exemplos de Caixas Box-Level</h1>
    <p>Os paragrafos tambem sao exemplos de box level, mas os <a href="a">Links sao exemplos de caixas inline-level</a> Vamos ver como tudo isso funciona</p>
</body>
</html>
